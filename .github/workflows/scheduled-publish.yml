name: Scheduled Blog Publish

# Runs every Tuesday and Friday at 8am Mountain Time (14:00 UTC).
# Also triggerable manually from the GitHub Actions tab.
on:
  schedule:
    - cron: "0 14 * * 2,5"  # Tuesday and Friday at 8am MT (UTC-6)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log what would publish without making changes)"
        required: false
        default: "false"
        type: boolean
      generate_new:
        description: "Generate a new post from blog-calendar.csv before publishing"
        required: false
        default: "true"
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate new post from calendar
        if: github.event.inputs.generate_new != 'false'
        run: npx tsx scripts/generate-post.ts --from-csv
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Check for posts due today
        id: check
        run: |
          echo "Today: $(date +%Y-%m-%d)"
          echo "Scheduled posts:"
          ls content/scheduled/ 2>/dev/null || echo "  (none)"

      - name: Run publisher
        run: npx tsx scripts/publish-scheduled.ts
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Run post-publish hooks
        run: npx tsx scripts/post-publish-hooks.ts

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && git diff --staged --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "FinishUltra Bot"
          git config user.email "bot@finishultra.com"
          git add src/lib/content/blog-posts.ts
          git add content/scheduled/ || true
          git add content/published/ || true
          git add content/blog-calendar.csv || true
          git add public/llms.txt || true
          DATE=$(date +%Y-%m-%d)
          git commit -m "📝 Auto-publish blog post — ${DATE}"
          git push

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "Nothing to publish today."
